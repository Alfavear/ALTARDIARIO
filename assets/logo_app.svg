<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="flameG" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#D84315"/>
      <stop offset="35%" stop-color="#FF6F00"/>
      <stop offset="70%" stop-color="#FFA726"/>
      <stop offset="100%" stop-color="#FFD54F"/>
    </linearGradient>
    <linearGradient id="coreG" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#FFCA28"/>
      <stop offset="100%" stop-color="#FFF9C4"/>
    </linearGradient>
    <linearGradient id="bgG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D47A1"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bgG)"/>

  <!-- Bible (open book) -->
  <g transform="translate(256,380)">
    <rect x="-80" y="-50" width="160" height="72" rx="6" fill="#5D4037"/>
    <path d="M0,-44 Q-30,-40 -60,-38 L-70,10 Q-35,14 0,16 Z" fill="#FFF8E1" stroke="#F5E6CA" stroke-width="1.5"/>
    <path d="M0,-44 Q30,-40 60,-38 L70,10 Q35,14 0,16 Z" fill="#FFF8E1" stroke="#F5E6CA" stroke-width="1.5"/>
    <line x1="0" y1="-44" x2="0" y2="16" stroke="#3E2723" stroke-width="3"/>
    <line x1="-50" y1="-28" x2="-12" y2="-28" stroke="#D7CCC8" stroke-width="1.5"/>
    <line x1="-50" y1="-18" x2="-16" y2="-18" stroke="#D7CCC8" stroke-width="1.5"/>
    <line x1="-50" y1="-8" x2="-20" y2="-8" stroke="#D7CCC8" stroke-width="1.5"/>
    <line x1="-50" y1="2" x2="-24" y2="2" stroke="#D7CCC8" stroke-width="1.5"/>
    <line x1="12" y1="-28" x2="50" y2="-28" stroke="#D7CCC8" stroke-width="1.5"/>
    <line x1="16" y1="-18" x2="50" y2="-18" stroke="#D7CCC8" stroke-width="1.5"/>
    <line x1="20" y1="-8" x2="50" y2="-8" stroke="#D7CCC8" stroke-width="1.5"/>
    <line x1="24" y1="2" x2="50" y2="2" stroke="#D7CCC8" stroke-width="1.5"/>
    <path d="M0,-44 L6,-26 L0,-30 L-6,-26 Z" fill="#D32F2F"/>
  </g>

  <!-- Logs -->
  <g transform="translate(256,295)">
    <g transform="rotate(-20)">
      <rect x="-60" y="-12" width="120" height="24" rx="6" fill="#6D4C41" stroke="#4E342E" stroke-width="2"/>
      <line x1="-50" y1="-6" x2="50" y2="-6" stroke="#5D4037" stroke-width="1.5"/>
      <line x1="-50" y1="6" x2="50" y2="6" stroke="#5D4037" stroke-width="1.5"/>
      <circle cx="-50" cy="0" r="5" fill="#4E342E"/>
      <circle cx="50" cy="0" r="5" fill="#4E342E"/>
    </g>
    <g transform="rotate(20)">
      <rect x="-60" y="-12" width="120" height="24" rx="6" fill="#6D4C41" stroke="#4E342E" stroke-width="2"/>
      <line x1="-50" y1="-6" x2="50" y2="-6" stroke="#5D4037" stroke-width="1.5"/>
      <line x1="-50" y1="6" x2="50" y2="6" stroke="#5D4037" stroke-width="1.5"/>
      <circle cx="-50" cy="0" r="5" fill="#4E342E"/>
      <circle cx="50" cy="0" r="5" fill="#4E342E"/>
    </g>
    <rect x="-45" y="-10" width="90" height="20" rx="5" fill="#5D4037" stroke="#4E342E" stroke-width="2"/>
    <line x1="-35" y1="-5" x2="35" y2="-5" stroke="#4E342E" stroke-width="1.5"/>
    <line x1="-35" y1="5" x2="35" y2="5" stroke="#4E342E" stroke-width="1.5"/>
    <circle cx="-35" cy="0" r="4" fill="#4E342E"/>
    <circle cx="35" cy="0" r="4" fill="#4E342E"/>
  </g>

  <!-- Flame -->
  <g transform="translate(256,175)">
    <!-- Outer flame -->
    <path d="M0,-95 C25,-75 35,-40 30,-15 C25,5 15,15 0,15 C-15,15 -25,5 -30,-15 C-35,-40 -25,-75 0,-95 Z" fill="url(#flameG)"/>
    <!-- Left tongue -->
    <path d="M-15,-30 C-28,-40 -30,-55 -20,-65 C-15,-70 -12,-60 -10,-50 Z" fill="url(#flameG)"/>
    <!-- Right tongue -->
    <path d="M15,-25 C28,-35 30,-50 20,-60 C15,-65 12,-55 10,-45 Z" fill="url(#flameG)"/>
    <!-- Inner core -->
    <path d="M0,-65 C12,-50 15,-25 10,-10 C5,0 -5,0 -10,-10 C-15,-25 -12,-50 0,-65 Z" fill="url(#coreG)" opacity="0.9"/>

    <!-- Face -->
    <!-- Eyes -->
    <circle cx="-10" cy="-15" r="6" fill="white"/>
    <circle cx="10" cy="-15" r="6" fill="white"/>
    <circle cx="-10" cy="-15" r="6" fill="none" stroke="#5D4037" stroke-width="1.2"/>
    <circle cx="10" cy="-15" r="6" fill="none" stroke="#5D4037" stroke-width="1.2"/>
    <!-- Pupils -->
    <circle cx="-9" cy="-14.5" r="3.2" fill="#2C2C2C"/>
    <circle cx="11" cy="-14.5" r="3.2" fill="#2C2C2C"/>
    <!-- Highlights -->
    <circle cx="-11.5" cy="-17" r="1.5" fill="white"/>
    <circle cx="8.5" cy="-17" r="1.5" fill="white"/>
    <!-- Eyebrows -->
    <path d="M-16,-23 Q-10,-26 -4,-23" fill="none" stroke="#5D4037" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M4,-23 Q10,-26 16,-23" fill="none" stroke="#5D4037" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Smile -->
    <path d="M-8,-6 Q0,-2 8,-6" fill="none" stroke="#5D4037" stroke-width="2" stroke-linecap="round"/>
    <!-- Cheeks -->
    <circle cx="-18" cy="-10" r="5" fill="#FF8A80" opacity="0.35"/>
    <circle cx="18" cy="-10" r="5" fill="#FF8A80" opacity="0.35"/>
  </g>
</svg>
