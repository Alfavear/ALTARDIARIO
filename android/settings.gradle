include ':app'

def localPropertiesFile = new File(rootProject.projectDir, "local.properties")
def properties = new Properties()

def flutterSdkPath
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader -> properties.load(reader) }
    flutterSdkPath = properties.getProperty("flutter.sdk")
}
if (flutterSdkPath == null) {
    flutterSdkPath = System.getenv("FLUTTER_ROOT")
}
if (flutterSdkPath == null) {
    throw new GradleException("Flutter SDK not found. Define location with flutter.sdk in the local.properties file or with a FLUTTER_ROOT environment variable.")
}

def flutterProjectRoot = rootProject.projectDir.parentFile.toPath()

settings.ext.flutterSdkPath = flutterSdkPath
settings.ext.flutterProjectRoot = flutterProjectRoot

pluginManagement {
    def flutterSdkDir = settings.ext.flutterSdkPath
    includeBuild("${flutterSdkDir}/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.1.0" apply false
    id "org.jetbrains.kotlin.android" version "1.9.22" apply false
}
