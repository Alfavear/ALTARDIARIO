name: altar_diario
description: "altarDiario - Tu hábito diario con Dios. Plan de lectura bíblica anual."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.5
  flutter_local_notifications: ^18.0.1
  url_launcher: ^6.3.2
  intl: ^0.20.2
  http: ^1.2.1
  google_fonts: ^8.1.0
  timezone: ^0.11.0
  sqflite: ^2.4.3
  path: ^1.9.0

  # --- Firebase ---
  # ⚠️ Para actualizar Firebase, ejecuta: flutterfire configure
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  google_sign_in: ^6.2.1
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0
  firebase_messaging: ^15.0.0

  # --- Riverpod (estado global) ---
  flutter_riverpod: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
  image_path: "assets/logo_app.svg"
  adaptive_icon_background: "#0D47A1"
  adaptive_icon_foreground: "assets/logo_app.svg"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/plan_lectura.json
    - assets/bible/
