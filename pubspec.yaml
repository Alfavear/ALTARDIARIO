name: altar_diario
description: "altarDiario - Tu hábito diario con Dios. Plan de lectura bíblica anual."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.3
  flutter_local_notifications: ^18.0.1
  url_launcher: ^6.3.1
  intl: ^0.19.0
  google_fonts: ^6.2.1
  timezone: ^0.10.0

  # --- Firebase ---
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0
  firebase_messaging: ^15.0.0

  # --- Riverpod (estado global) ---
  flutter_riverpod: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/plan_lectura.json
